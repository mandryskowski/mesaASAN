name: Build Mesa llvmpipe with ASan
on:
  push:
  workflow_dispatch:

jobs:
  build-mesa:
    runs-on: ubuntu-24.04
    steps:
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          
          sudo apt-get install -y clang lld ninja-build libelf-dev python3-mako python3-yaml \
          llvm-dev glslang-tools libglvnd-dev libdrm-dev \
          wayland-protocols libwayland-dev libwayland-egl-backend-dev bison flex \
          libx11-dev libx11-xcb-dev libxdamage-dev libxext-dev libxfixes-dev \
          libxshmfence-dev libxxf86vm-dev libxrandr-dev \
          libxcb-glx0-dev libxcb-shm0-dev libxcb-dri2-0-dev libxcb-dri3-dev \
          libxcb-present-dev libxcb-sync-dev
          
          pipx install meson
      
      - name: Clone Mesa
        run: git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git

      - name: Configure and Build
        run: |
          cd mesa
          CC=clang CXX=clang++ meson setup builddir/ \
            --prefix="$(pwd)/builddir/install" \
            -Db_sanitize=address \
            -Dgallium-drivers=llvmpipe \
            -Dvulkan-drivers=swrast \
            -Dbuildtype=debug
            
          ninja -C builddir/
          meson install -C builddir/
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesa-llvmpipe-asan
          path: mesa/builddir/install/