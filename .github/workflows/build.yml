name: Build Mesa with ASan
on:
  push:
  workflow_dispatch:
jobs:
  build-mesa:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y llvm-20-dev lld-20 libclc-20-dev llvm-spirv-20 libllvmspirvlib-20-dev libclang-20-dev

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libelf-dev python3-mako python3-yaml glslang-tools libglvnd-dev libdrm-dev wayland-protocols libwayland-dev libwayland-egl-backend-dev bison flex libx11-dev libx11-xcb-dev libxdamage-dev libxext-dev libxfixes-dev libxshmfence-dev libxxf86vm-dev libxrandr-dev libxcb-glx0-dev libxcb-shm0-dev libxcb-dri2-0-dev libxcb-dri3-dev libxcb-present-dev libxcb-sync-dev
          pipx install meson

      - name: Clone Mesa
        run: |
          MESA_SHA=$(cat MESA_COMMIT)
          git clone --filter=blob:none https://gitlab.freedesktop.org/mesa/mesa.git mesa
          cd mesa
          git checkout "$MESA_SHA"

      - name: Configure and Build
        run: |
          cd mesa
          CC=clang-20 CXX=clang++-20 LDFLAGS="-fuse-ld=lld-20" LLVM_CONFIG=llvm-config-20 meson setup builddir/ --prefix="$(pwd)/builddir/install" -Db_sanitize=address -Db_lundef=false -Dgallium-drivers="llvmpipe" -Dvulkan-drivers=amd,intel,swrast -Dtools=drm-shim,intel -Dbuildtype=debug
          ninja -C builddir/
          meson install -C builddir/

      - name: Bundle script
        run: |
          cp run_fuzz.sh mesa/builddir/install/
          chmod +x mesa/builddir/install/run_fuzz.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesa-llvmpipe-asan
          path: mesa/builddir/install/
