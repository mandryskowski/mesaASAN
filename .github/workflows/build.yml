name: Build Mesa llvmpipe with ASan
on:
  push:
  workflow_dispatch:

jobs:
  build-mesa:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: asan
            coverage: 'false'
          - name: asan-coverage
            coverage: 'true'
    steps:
      - name: Install LLVM 18
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          # Install clang-18, lld-18, and base llvm-18
          sudo ./llvm.sh 18
          # Install the development headers required by Mesa LLVMpipe
          sudo apt-get install -y llvm-18-dev lld-18

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          
          # Removed the default clang, lld, and llvm-dev since we installed v18 above
          sudo apt-get install -y ninja-build libelf-dev python3-mako python3-yaml \
          glslang-tools libglvnd-dev libdrm-dev \
          wayland-protocols libwayland-dev libwayland-egl-backend-dev bison flex \
          libx11-dev libx11-xcb-dev libxdamage-dev libxext-dev libxfixes-dev \
          libxshmfence-dev libxxf86vm-dev libxrandr-dev \
          libxcb-glx0-dev libxcb-shm0-dev libxcb-dri2-0-dev libxcb-dri3-dev \
          libxcb-present-dev libxcb-sync-dev
          
          pipx install meson
      
      - name: Clone Mesa
        run: git clone --depth 1 https://gitlab.freedesktop.org/mesa/mesa.git

      - name: Configure and Build
        run: |
          cd mesa
          
          export LDFLAGS="-fuse-ld=lld-18"
          
          if [ "${{ matrix.coverage }}" == "true" ]; then
            # Use LLVM source-based coverage instead of gcov to avoid hardcoded .gcda paths.
            # Make paths relative so the coverage map is portable to another machine.
            export CFLAGS="-fprofile-instr-generate -fcoverage-mapping -ffile-prefix-map=$(pwd)=."
            export CXXFLAGS="-fprofile-instr-generate -fcoverage-mapping -ffile-prefix-map=$(pwd)=."
            export LDFLAGS="$LDFLAGS -fprofile-instr-generate"
          fi

          # Explicitly point to clang-18, lld-18, and llvm-config-18
          CC=clang-18 CXX=clang++-18 \
          LLVM_CONFIG=llvm-config-18 \
          meson setup builddir/ \
            --prefix="$(pwd)/builddir/install" \
            -Db_sanitize=address \
            -Db_lundef=false \
            -Dgallium-drivers=llvmpipe \
            -Dvulkan-drivers=swrast \
            -Dbuildtype=debug
            
          ninja -C builddir/
          meson install -C builddir/
          
          # 1. Fix absolute paths in the Vulkan ICD manifest so it's fully portable out-of-the-box
          sed -i 's|"[^"]*/libvulkan_lvp\.so"|"libvulkan_lvp.so"|g' builddir/install/share/vulkan/icd.d/lvp_icd.*.json
          
          # 2. Bundle the LLVM shared library. On Ubuntu, it is typically located in /usr/lib/x86_64-linux-gnu/
          # rather than the directory returned by llvm-config. We use `ldd` to dynamically find exactly where it is.
          mkdir -p builddir/install/lib/x86_64-linux-gnu/
          LLVM_SO_PATH=$(ldd builddir/install/lib/x86_64-linux-gnu/libvulkan_lvp.so | grep libLLVM | awk '{print $3}')
          if [ -n "$LLVM_SO_PATH" ] && [ -f "$LLVM_SO_PATH" ]; then
            # Use -L to resolve any symlinks so we upload the actual binary data
            cp -L "$LLVM_SO_PATH" builddir/install/lib/x86_64-linux-gnu/
          fi
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mesa-llvmpipe-${{ matrix.name }}
          path: mesa/builddir/install/